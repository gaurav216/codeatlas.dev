{{define "content"}}
<section class="mx-auto max-w-7xl px-4 py-12 sm:px-6 sm:py-16 lg:px-8">
  <div class="mb-8 max-w-3xl">
    <p class="text-sm font-black uppercase tracking-wide text-cyan-700">Topics</p>
    <h1 class="mt-3 text-4xl font-black tracking-tight text-slate-950 sm:text-6xl">Map the stack by topic.</h1>
    <p class="mt-5 text-lg leading-8 text-slate-600">Browse focused study tracks for system design, DevOps, algorithms, Go services, and production operations.</p>
  </div>

  <div class="grid gap-5 sm:grid-cols-2 xl:grid-cols-3">
    {{range .Categories}}
    <a class="group rounded-3xl border border-slate-200 bg-white p-6 shadow-soft transition hover:-translate-y-1 hover:border-cyan-300 hover:shadow-lg" href="/topic/{{.Slug}}">
      <div class="flex items-start justify-between gap-4">
        <div>
          <h2 class="text-2xl font-black tracking-tight text-slate-950 group-hover:text-cyan-700">{{.Title}}</h2>
          <p class="mt-3 text-sm text-slate-600">{{.Count}} guide{{if ne .Count 1}}s{{end}}</p>
        </div>
        <span class="grid h-10 w-10 place-items-center rounded-full bg-cyan-700 text-lg font-black text-white">/</span>
      </div>
    </a>
    {{end}}
  </div>
</section>
{{end}}
